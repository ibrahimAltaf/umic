name: Deploy web to Hostinger

on:
  workflow_dispatch:
  push:
    paths:
      - "apps/web/**"
      - "deploy/hostinger/**"
      - ".github/workflows/deploy-hostinger.yml"
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pack bootstrap
        run: |
          cd deploy/hostinger
          zip -q /tmp/umic-boot.zip package.json prepare.js vite.config.js
          ls -la /tmp/umic-boot.zip

      - name: Upload & build on Hostinger
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          HOSTINGER_USERNAME: ${{ vars.HOSTINGER_USERNAME }}
          HOSTINGER_DOMAIN: ${{ vars.HOSTINGER_DOMAIN }}
        run: |
          set -euo pipefail
          if [ -z "${HOSTINGER_API_TOKEN:-}" ]; then
            echo "HOSTINGER_API_TOKEN secret is missing"
            exit 1
          fi
          USERNAME="${HOSTINGER_USERNAME:-u568003891}"
          DOMAIN="${HOSTINGER_DOMAIN:-navajowhite-zebra-173468.hostingersite.com}"
          # archive-only multipart; retry on Cloudflare 403
          for attempt in 1 2 3 4 5 6; do
            echo "Upload attempt $attempt"
            RESP=$(curl -sS -w '\n%{http_code}' \
              -H "Authorization: Bearer $HOSTINGER_API_TOKEN" \
              -H 'Accept: application/json' \
              -H 'User-Agent: hostinger-api-sdk/1.5.1' \
              -F "archive=@/tmp/umic-boot.zip;type=application/zip" \
              "https://developers.hostinger.com/api/hosting/v1/accounts/${USERNAME}/websites/${DOMAIN}/nodejs/builds/from-archive")
            CODE=$(echo "$RESP" | tail -n1)
            BODY=$(echo "$RESP" | sed '$d')
            echo "HTTP $CODE"
            echo "$BODY" | head -c 500; echo
            if [ "$CODE" = "200" ]; then
              break
            fi
            sleep $((attempt * 20))
          done
          test "$CODE" = "200"
          UUID=$(echo "$BODY" | python3 -c 'import sys,json; print(json.load(sys.stdin)["uuid"])')
          echo "Build UUID=$UUID"
          for i in $(seq 1 90); do
            LIST=$(curl -sS -H "Authorization: Bearer $HOSTINGER_API_TOKEN" -H 'Accept: application/json' \
              "https://developers.hostinger.com/api/hosting/v1/accounts/${USERNAME}/websites/${DOMAIN}/nodejs/builds")
            STATE=$(echo "$LIST" | python3 -c "import sys,json; d=json.load(sys.stdin); print(next((b['state'] for b in d.get('data',[]) if b['uuid']=='$UUID'),'?'))")
            echo "[$i] $STATE"
            if [ "$STATE" = "completed" ] || [ "$STATE" = "failed" ]; then
              curl -sS -H "Authorization: Bearer $HOSTINGER_API_TOKEN" -H 'Accept: application/json' \
                "https://developers.hostinger.com/api/hosting/v1/accounts/${USERNAME}/websites/${DOMAIN}/nodejs/builds/$UUID/logs" \
                | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("logs","")[-8000:])'
              test "$STATE" = "completed"
              break
            fi
            sleep 10
          done
          sleep 5
          echo "Checking site..."
          for path in / /login/ /dashboard/; do
            CODE=$(curl -sS -o /tmp/out.html -w '%{http_code}' -A 'Mozilla/5.0' "https://${DOMAIN}${path}" || echo err)
            TITLE=$(grep -oE '<title>[^<]*</title>' /tmp/out.html | head -1 || true)
            echo "${path} -> HTTP ${CODE} ${TITLE}"
          done
