services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: umic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-umic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-umic_dev_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-umic}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-umic} -d ${POSTGRES_DB:-umic}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - umic-network

  redis:
    image: redis:7-alpine
    container_name: umic-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - umic-network

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api/Dockerfile
    container_name: umic-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-umic}:${POSTGRES_PASSWORD:-umic_dev_password_change_me}@postgres:5432/${POSTGRES_DB:-umic}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - umic-network

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/worker/Dockerfile
    container_name: umic-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-umic}:${POSTGRES_PASSWORD:-umic_dev_password_change_me}@postgres:5432/${POSTGRES_DB:-umic}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./apps/api:/app/api
      - ./apps/worker:/app/worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: >
      celery -A app.celery_app.celery worker
      --loglevel=INFO
      --concurrency=2
    working_dir: /app/worker
    networks:
      - umic-network

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Unified Matter Intelligence Center}
    container_name: umic-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Unified Matter Intelligence Center}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - umic-network

volumes:
  postgres_data:
  redis_data:

networks:
  umic-network:
    driver: bridge
